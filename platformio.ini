; PlatformIO project configuration – dual firmware variants from one codebase.

[platformio]
default_envs = esp01_release

[env]
platform  = espressif8266
board     = esp01_1m
framework = arduino

; ── clock & flash ──────────────────────────────────────────────────────────────
board_build.f_cpu        = 80000000L    ; 80 MHz CPU
board_build.f_flash      = 40000000L    ; 40 MHz flash
board_build.flash_mode   = dout         ; DOUT – safe for W25Q80DV variants
board_build.ldscript     = eagle.flash.1m64.ld  ; 1 MB, 64 KB SPIFFS (unused)

; ── lwIP variant – lowest memory footprint ─────────────────────────────────────
build_flags =
    -D PIO_FRAMEWORK_ARDUINO_LWIP2_LOW_MEMORY
    -D NDEBUG

; ── upload ─────────────────────────────────────────────────────────────────────
upload_speed    = 115200
upload_protocol = esptool

extra_scripts = post:scripts/copy_firmware.py

; ── library dependencies (only ESP8266 core built-ins needed) ──────────────────
; No extra libraries required – uses only:
;   ESP8266WiFi, EEPROM, ESP8266WebServer (all in ESP8266 Arduino core)

; ── monitor (disabled in release – UART belongs to FY6900) ─────────────────────
; monitor_speed = 115200   ; uncomment only with DEBUG_BUILD + GPIO2 adapter

[env:esp01_release]
extends = env
build_flags =
    ${env.build_flags}
    -D FW_RELEASE

[env:esp01_diag_uart0]
extends = env
build_flags =
    ${env.build_flags}
    -D FW_DIAG_UART0

[env:esp01_diag_wifi]
extends = env
build_flags =
    ${env.build_flags}
    -D FW_DIAG_WIFI

[env:esp01_diag_protocol]
extends = env
build_flags =
    ${env.build_flags}
    -D FW_DIAG_PROTOCOL
